name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install --force

      - name: Build Web Project
        run: |
          npm run build || (mkdir -p dist && cp index.html dist/index.html) || true

      - name: Build Android APK
        run: |
          # ক্যাপাসিটর টুলস ইনস্টল
          npm install @capacitor/core @capacitor/cli @capacitor/android@capacitor/device
          
          # যদি আগে থেকে অ্যান্ড্রয়েড ফোল্ডার থাকে তবে তা মুছে ফেলা (পরিষ্কার বিল্ডের জন্য)
          rm -rf android
          
          # ক্যাপাসিটর নতুন করে সেটআপ
          npx cap init NetPulse com.akash.netpulse --web-dir dist || true
          npx cap add android
          npx cap sync android
          
          # গ্রেডেল র‍্যাপার ঠিক করা এবং বিল্ড রান করা
          cd android
          ./gradlew clean
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NetPulse-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
